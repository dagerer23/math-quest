# MathQuest Nginx 配置
# 用法: 复制到 /etc/nginx/sites-available/ 并软链到 sites-enabled/

upstream mathquest_api {
    # PM2 集群多进程负载均衡
    server 127.0.0.1:3002;
    # 如果 PM2 指定了多个端口，追加更多 server 行
    # server 127.0.0.1:3003;
    keepalive 64;
}

server {
    listen 80;
    server_name your-domain.com;  # 替换为实际域名

    # 日志
    access_log /var/log/nginx/mathquest-access.log;
    error_log  /var/log/nginx/mathquest-error.log;

    # 客户端上传限制
    client_max_body_size 10m;

    # ===== 前端静态资源 =====
    location / {
        root /path/to/math-quest/dist;  # 替换为实际 dist 路径
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源强缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ===== API 反向代理到 Node.js =====
    location /api/ {
        proxy_pass http://mathquest_api;
        proxy_http_version 1.1;

        # WebSocket 支持（未来实时功能预留）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 头传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 连接池复用
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ===== 安全头 =====
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}